<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5AB" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8960F" />
    </linearGradient>
    <linearGradient id="steamGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Coffee Bean Icon -->
  <g transform="translate(30, 40)">
    <!-- Outer bean shape -->
    <ellipse cx="40" cy="60" rx="28" ry="40" fill="url(#goldGrad)" />
    <!-- Inner bean detail -->
    <ellipse cx="40" cy="60" rx="14" ry="24" fill="#0A0A0A" />
    <!-- Bean center line -->
    <path d="M40 36 Q48 60 40 84" stroke="url(#goldGrad)" stroke-width="2" fill="none" />
    <!-- Steam wisps -->
    <path d="M28 24 Q24 14 28 4" stroke="url(#steamGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" />
    <path d="M40 18 Q36 8 40 -2" stroke="url(#steamGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" />
    <path d="M52 24 Q48 14 52 4" stroke="url(#steamGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" />
  </g>

  <!-- Brand Name -->
  <text x="130" y="105" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="bold" fill="url(#goldGrad)" letter-spacing="3">
    Sundara
  </text>

  <!-- Tagline -->
  <rect x="130" y="118" width="200" height="1.5" fill="url(#goldGrad)" opacity="0.5" />
  <text x="130" y="140" font-family="Arial, sans-serif" font-size="11" fill="#A3A3A3" letter-spacing="4" font-weight="500">
    PREMIUM COFFEE ROASTERY
  </text>
</svg>
